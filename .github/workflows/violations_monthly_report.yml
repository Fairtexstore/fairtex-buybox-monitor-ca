name: Monthly MSRP Violations Report

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send monthly MSRP violations digest
        env:
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CEO_USER_ID: ${{ secrets.SLACK_CEO_USER_ID }}
        run: python src/violations_monthly_report.py
